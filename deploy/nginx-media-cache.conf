# Firebase Storage reverse proxy + edge cache (https://myrank.com.tr/fb-media/…)
# Install:
#   sudo cp deploy/nginx-fbmedia-map.conf /etc/nginx/conf.d/fbmedia-map.conf
#   sudo cp deploy/nginx-media-cache.conf /etc/nginx/conf.d/fbmedia-cache.conf
# Include the location block inside the HTTPS server BEFORE location /.

proxy_cache_path /var/cache/nginx/fbmedia levels=1:2 keys_zone=fbmedia:64m max_size=4g inactive=14d use_temp_path=off;

# Prefix match + $request_uri map preserves %2F in Firebase object paths.
location /fb-media/ {
  resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;
  resolver_timeout 5s;
  proxy_pass https://firebasestorage.googleapis.com$firebase_storage_uri;
  proxy_ssl_server_name on;
  proxy_http_version 1.1;
  proxy_set_header Host firebasestorage.googleapis.com;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header Connection "";

  proxy_cache fbmedia;
  proxy_cache_valid 200 206 14d;
  proxy_cache_valid 404 1m;
  proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
  proxy_cache_lock on;
  proxy_cache_key $uri$is_args$args;

  add_header X-Cache-Status $upstream_cache_status always;
  proxy_read_timeout 120s;
}
