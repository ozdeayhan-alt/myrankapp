# Reverse proxy for MyRank API — replace api.example.com with your domain.
# API gzip: deploy/nginx-gzip.conf → /etc/nginx/conf.d/myrank-gzip.conf
# Install: sudo cp deploy/nginx-api.conf /etc/nginx/sites-available/myrank-api
#          sudo ln -sf /etc/nginx/sites-available/myrank-api /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream myrank_api {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name api.example.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name api.example.com;

  ssl_certificate /etc/letsencrypt/live/api.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 30m;

  location / {
    proxy_pass http://myrank_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }
}
