# HTTP reverse proxy — domain/HTTPS öncesi geçici veya certbot öncesi kullanım.
# Install: sudo cp deploy/nginx-api-http.conf /etc/nginx/sites-available/myrank-api
#          sudo ln -sf /etc/nginx/sites-available/myrank-api /etc/nginx/sites-enabled/myrank-api
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

upstream myrank_api {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  client_max_body_size 30m;

  location / {
    proxy_pass http://myrank_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }
}
