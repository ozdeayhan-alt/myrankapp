# Production nginx site — myrank.com.tr
# Install: sudo cp deploy/nginx-myrank-production.conf /etc/nginx/sites-available/myrank-api
#          sudo ln -sf /etc/nginx/sites-available/myrank-api /etc/nginx/sites-enabled/myrank-api
#          sudo nginx -t && sudo systemctl reload nginx
#
# Media cache zone: deploy/nginx-media-cache.conf → /etc/nginx/conf.d/fbmedia-cache.conf

upstream myrank_api {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name myrank.com.tr;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name myrank.com.tr;

  ssl_certificate /etc/letsencrypt/live/myrank.com.tr/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/myrank.com.tr/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 30m;

  # Prefix match + $request_uri map preserves %2F in Firebase object paths.
  location /fb-media/ {
    resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;
    resolver_timeout 5s;
    proxy_pass https://firebasestorage.googleapis.com$firebase_storage_uri;
    proxy_ssl_server_name on;
    proxy_http_version 1.1;
    proxy_set_header Host firebasestorage.googleapis.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";

    proxy_cache fbmedia;
    proxy_cache_valid 200 206 14d;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_cache_key $uri$is_args$args;

    add_header X-Cache-Status $upstream_cache_status always;
    proxy_read_timeout 120s;
  }

  location / {
    proxy_pass http://myrank_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }
}
