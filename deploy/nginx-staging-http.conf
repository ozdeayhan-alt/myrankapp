# Staging HTTP bootstrap — use until DNS + certbot complete.
# Replaced automatically by setup-staging.sh after HTTPS is ready.

upstream myrank_staging {
  server 127.0.0.1:3001;
  keepalive 16;
}

server {
  listen 80;
  listen [::]:80;
  server_name staging.myrank.com.tr;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  client_max_body_size 30m;

  location /fb-media/ {
    resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;
    resolver_timeout 5s;
    proxy_pass https://firebasestorage.googleapis.com$firebase_storage_uri;
    proxy_ssl_server_name on;
    proxy_http_version 1.1;
    proxy_set_header Host firebasestorage.googleapis.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";

    proxy_cache fbmedia;
    proxy_cache_valid 200 206 14d;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_cache_key $uri$is_args$args;

    add_header X-Cache-Status $upstream_cache_status always;
    proxy_read_timeout 120s;
  }

  location / {
    proxy_pass http://myrank_staging;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }
}
