# JSON/text API responses — extends gzip in /etc/nginx/nginx.conf (gzip on is set there).
# Install:
#   sudo cp deploy/nginx-gzip.conf /etc/nginx/conf.d/myrank-gzip.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Skips binary media (image/*, video/*) via gzip_types whitelist.

gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
  application/json
  application/javascript
  application/xml
  text/css
  text/javascript
  text/plain
  text/xml;
